## inanna/roster_build.sls
#
# Purpose:
#   This should build or update a Salt SSH roster automatically from the management-port
#   discovery results created by discover.sls (inanna_alive_mgmt_*.txt).
#
# Behavior:
#   - Reads IPs from files (glob) on the local system
#   - Generates YAML roster entries with defaults from pillar (user, sudo, port, key)
#   - Writes them into /etc/salt/roster inside a managed block so it’s safe to re-run
#   - Prefers the stable symlink: /var/log/inanna/inanna_alive_mgmt_latest.txt
#
# Usage:
#   - Run this on the Salt master (or the "scanner" host that has the log files):
#     salt 'salt-master-id' state.apply inanna.roster_build
#
# Pillar (canonical; legacy fallbacks supported):
#   inanna:
#     ssh:
#       roster:
#         output_path: /etc/salt/roster
#         overwrite: false
#         default_user: ec2-user
#         use_sudo: true
#         ssh_port: 22
#         priv_key: /root/.ssh/id_rsa
#         name_prefix: 'sshhost-'
#     discovery:
#       paths:
#         discovery_glob: '/var/log/inanna/inanna_alive_mgmt_*.txt'
#         log_dir: '/var/log/inanna'
#   # Legacy (still supported): inanna.roster.*, inanna:roster:candidates_glob

{# --- Read config (canonical first, legacy fallbacks) --- #}
{% set inanna        = salt['pillar.get']('inanna', {}) %}
{% set ssh           = inanna.get('ssh', {}) %}
{% set roster_cfg    = ssh.get('roster', inanna.get('roster', {})) %}
{% set disc          = inanna.get('discovery', {}) %}
{% set paths         = disc.get('paths', {}) %}
{% set targeting     = inanna.get('targeting', {}) %}
{% set blacklist     = targeting.get('blacklist', inanna.get('exclude_hosts', [])) %}

{% set roster_path   = roster_cfg.get('output_path', '/etc/salt/roster') %}
{% set overwrite     = roster_cfg.get('overwrite', False) %}
{% set default_user  = roster_cfg.get('default_user', 'ec2-user') %}
{% set use_sudo      = roster_cfg.get('use_sudo', True) %}
{% set ssh_port      = roster_cfg.get('ssh_port', 22) %}
{% set priv_key      = roster_cfg.get('priv_key', '/root/.ssh/id_rsa') %}
{% set name_prefix   = roster_cfg.get('name_prefix', 'sshhost-') %}

{% set log_dir       = paths.get('log_dir', '/var/log/inanna') %}
{% set default_glob  = paths.get('discovery_glob', log_dir ~ '/inanna_alive_mgmt_*.txt') %}
{% set candidates_glob = roster_cfg.get('candidates_glob', default_glob) %}
{% set latest_link   = log_dir ~ '/inanna_alive_mgmt_latest.txt' %}

{# --- Ensure /etc/salt exists and the roster file has sane perms --- #}
ensure_salt_dir:
  file.directory:
    - name: {{ salt['file.dirname'](roster_path) or '/etc/salt' }}
    - user: root
    - group: root
    - mode: '0755'
    - makedirs: True

inanna-roster-file-touch:
  file.touch:
    - name: {{ roster_path }}
    - require:
      - file: ensure_salt_dir

inanna-roster-perms:
  file.managed:
    - name: {{ roster_path }}
    - user: root
    - group: root
    - mode: '0640'
    - replace: False
    - require:
      - file: inanna-roster-file-touch

{# --- Resolve discovery source: prefer latest symlink, else newest by glob --- #}
{% set latest = latest_link if salt['file.file_exists'](latest_link) else salt['cmd.run']('ls -1t ' ~ candidates_glob ~ ' 2>/dev/null | head -n1') %}

inanna-roster-source-note:
  test.nop:
    - comment: "Using discovery source: {{ latest if latest else '(none found)' }}"

{# --- Parse IPs from the chosen source (header-aware, with fallback) --- #}
{% if latest %}
  {% set awk_header = "awk '/^--- Alive Hosts \\(by management TCP ports\\) ---/{f=1;next} /^$/{if(f)exit} f && /^[0-9]/{print}' " ~ latest ~ " 2>/dev/null" %}
  {% set ips_raw = salt['cmd.run'](awk_header).strip() %}
  {% if not ips_raw %}
    {# Fallback: treat file as plain IP list, one per line #}
    {% set ips_raw = salt['cmd.run']("awk '^[0-9]' " ~ latest ~ " 2>/dev/null | sort -u").strip() %}
  {% endif %}
  {% set ips_list = ips_raw.split() %}
{% else %}
  {% set ips_list = [] %}
{% endif %}

{# --- Apply blacklist/exclusions and build roster block --- #}
{% set lines = [] %}
{% for ip in ips_list %}
  {% if ip and (ip not in blacklist) %}
    {% set key = (name_prefix ~ ip.replace('.', '-')) %}
    {% set entry -%}
{{ key }}:
  host: {{ ip }}
  user: {{ default_user }}
  sudo: {{ true if use_sudo else false }}
  port: {{ ssh_port }}
  priv: {{ priv_key }}
{%- endset %}
    {% do lines.append(entry) %}
  {% endif %}
{% endfor %}
{% set roster_block = (('# Auto-generated by Inanna (managed)\n') + (lines | join('\n')) + '\n') if lines else '# Auto-generated by Inanna (managed)\n# (No candidates found)\n' %}

{# --- Choose strategy: overwrite whole file OR manage a safe block --- #}
{% if overwrite %}
inanna-roster-write-full:
  file.managed:
    - name: {{ roster_path }}
    - user: root
    - group: root
    - mode: '0640'
    - contents: |
        {{ roster_block | indent(8, True) }}
    - require:
      - file: inanna-roster-perms
      - test: inanna-roster-source-note
{% else %}
inanna-roster-write-block:
  # Using file.blockreplace because:
  # It inserts/updates a clearly marked block in /etc/salt/roster without clobbering any entries we want to maintain manually.
  file.blockreplace:
    - name: {{ roster_path }}
    - marker_start: "# BEGIN Inanna Managed"
    - marker_end:   "# END Inanna Managed"
    - content: |
        {{ roster_block | indent(8, True) }}
    - append_if_not_found: True
    - backup: True
    - show_changes: True
    - require:
      - file: inanna-roster-perms
      - test: inanna-roster-source-note
{% endif %}